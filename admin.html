<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECLIPSE7 | Intel Admin Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-glass: rgba(15, 23, 42, 0.65);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --accent-blue: #38bdf8;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #090d16;
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .admin-wrapper {
            width: 100%;
            max-width: 1200px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 24px;
            margin-bottom: 32px;
        }
        h1 { margin: 0; font-size: 1.8rem; letter-spacing: -0.02em; }
        .refresh-btn {
            background: linear-gradient(135deg, #0284c7, #0369a1);
            color: white; border: none; padding: 12px 24px;
            border-radius: 12px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .refresh-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .table-container { overflow-x: auto; }
        table {
            width: 100%; border-collapse: collapse; text-align: left;
            font-size: 0.9rem;
        }
        th {
            padding: 16px; border-bottom: 2px solid var(--border-glass);
            color: #94a3b8; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em;
        }
        td { padding: 16px; border-bottom: 1px solid var(--border-glass); }
        tr:hover { background: rgba(255,255,255,0.02); }
        .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
        .badge {
            background: rgba(56, 189, 248, 0.15); color: var(--accent-blue);
            padding: 4px 8px; border-radius: 6px; font-weight: 700; font-size: 0.75rem;
        }
        .pdf-link {
            color: #4ade80; text-decoration: none; display: inline-flex;
            align-items: center; gap: 6px; font-weight: 600;
        }
        .pdf-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="admin-wrapper">
    <header>
        <div>
            <h1>Eclipse7 Intelligence Dashboard</h1>
            <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.9rem;">Live System Metric Tracking Gateway</p>
        </div>
        <button class="refresh-btn" onclick="fetchEvaluationRecords()">
            <i class="fa-solid fa-rotate"></i> Sync Live Matrix
        </button>
    </header>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Student Identity</th>
                    <th>Assessment Token</th>
                    <th>Profile</th>
                    <th>Score (Raw)</th>
                    <th>Accuracy %</th>
                    <th>Data Report</th>
                </tr>
            </thead>
            <tbody id="metricsTableBody">
                <tr>
                    <td colspan="7" style="text-align: center; color: #64748b; padding: 40px;">Initializing Core Sync Stream...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://marhkwvkprvoshowqpgq.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1hcmhrd3ZrcHJ2b3Nob3dxcGdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MTcwMTcsImV4cCI6MjA5ODk5MzAxN30.voml07f_WQTpEbu43EUhqeqgoAcBZJQ3mc3usbnwbzs";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function fetchEvaluationRecords() {
        const tbody = document.getElementById('metricsTableBody');
        try {
            const { data, error } = await supabase
                .from('evaluations')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;

            if (!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #64748b; padding: 40px;">No operational records registered in local cluster database.</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(record => {
                const date = new Date(record.created_at).toLocaleString();
                return `
                    <tr>
                        <td class="mono" style="color: #94a3b8;">${date}</td>
                        <td><strong>${record.student_name}</strong></td>
                        <td style="color: #cbd5e1;">${record.test_name}</td>
                        <td><span class="badge">${record.exam_profile}</span></td>
                        <td class="mono" style="font-weight:700; color:#38bdf8;">${Number(record.final_score).toFixed(2)}</td>
                        <td class="mono" style="color:#e2e8f0;">${record.efficiency}%</td>
                        <td>
                            ${record.pdf_storage_url ? `
                                <a href="${record.pdf_storage_url}" target="_blank" class="pdf-link">
                                    <i class="fa-solid fa-file-pdf"></i> View Output
                                </a>
                            ` : `<span style="color:#64748b;">No PDF File Linked</span>`}
                        </td>
                    </tr>
                `;
            }).join('');
        } catch (err) {
            console.error(err);
            tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #f87171; padding: 40px;">Connection Interrupted: Fault loading data matrix.</td></tr>`;
        }
    }

    document.addEventListener('DOMContentLoaded', fetchEvaluationRecords);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eclipse7 | Official Marking Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="calculator-card">
        <div class="brand-header">
            <h1>eclipse7</h1>
            <p>Certified Scoring Module</p>
        </div>

        <div class="user-details">
            <input type="text" id="studentName" placeholder="Full Student Name">
            <input type="text" id="testName" placeholder="Exam/Test Title">
        </div>

        <div class="input-section">
            <div class="input-group">
                <label>Total Attempted</label>
                <input type="number" id="attempted" placeholder="0">
            </div>
            <div class="input-group">
                <label>Number of Wrong</label>
                <input type="number" id="wrong" placeholder="0">
            </div>
            <div class="input-group">
                <label>Negative Ratio (e.g., 3 for 1/3)</label>
                <input type="number" id="ratio" value="3">
            </div>
        </div>

        <button class="btn-calc" onclick="calculateScore()">Calculate Final Score</button>
        
        <div class="result-display">
            <small>Final Calculated Marks</small>
            <div id="score">0.00</div>
        </div>

        <button class="btn-pdf" onclick="downloadPDF()">Download Verified Report</button>
        
        <div class="footer-link">
            <a href="https://eclipse7.odoo.com/" target="_blank">Verified by eclipse7.odoo.com</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

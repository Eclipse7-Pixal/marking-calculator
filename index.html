<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Negative Marking Engine v2.5</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1><i class="fa-solid fa-calculator"></i> ECLIPSE7</h1>
            <p class="subtitle">Negative Marking Engine v2.5</p>
        </header>

        <main>
            <!-- Global Config Section -->
            <section class="config-card glass-panel">
                <h3 class="section-title"><i class="fa-solid fa-gear"></i> Marking Scheme Configuration</h3>
                <div class="input-row">
                    <div class="input-group">
                        <label for="correct-marks">Correct Answer Marks</label>
                        <input type="number" id="correct-marks" value="4" placeholder="e.g. 4">
                    </div>
                    <div class="input-group">
                        <label for="negative-marks">Negative Marks</label>
                        <input type="number" id="negative-marks" value="1" placeholder="e.g. 1">
                    </div>
                </div>
            </section>

            <!-- Subject Cards Container -->
            <section class="subjects-container">
                <!-- Physics Card -->
                <div class="subject-card glass-panel" data-subject="physics">
                    <div class="subject-header">
                        <i class="fa-solid fa-atom subject-icon physics-color"></i>
                        <h3>Physics</h3>
                    </div>
                    <div class="card-inputs">
                        <div class="input-group">
                            <label><i class="fa-solid fa-circle-check"></i> Correct Answers</label>
                            <input type="number" class="input-correct" min="0" value="0">
                        </div>
                        <div class="input-group">
                            <label><i class="fa-solid fa-circle-xmark"></i> Incorrect Answers</label>
                            <input type="number" class="input-incorrect" min="0" value="0">
                        </div>
                    </div>
                </div>

                <!-- Chemistry Card -->
                <div class="subject-card glass-panel" data-subject="chemistry">
                    <div class="subject-header">
                        <i class="fa-solid fa-flask subject-icon chemistry-color"></i>
                        <h3>Chemistry</h3>
                    </div>
                    <div class="card-inputs">
                        <div class="input-group">
                            <label><i class="fa-solid fa-circle-check"></i> Correct Answers</label>
                            <input type="number" class="input-correct" min="0" value="0">
                        </div>
                        <div class="input-group">
                            <label><i class="fa-solid fa-circle-xmark"></i> Incorrect Answers</label>
                            <input type="number" class="input-incorrect" min="0" value="0">
                        </div>
                    </div>
                </div>

                <!-- Mathematics / Biology Card -->
                <div class="subject-card glass-panel" data-subject="math-bio">
                    <div class="subject-header">
                        <i class="fa-solid fa-dna subject-icon math-color"></i>
                        <h3>Mathematics / Biology</h3>
                    </div>
                    <div class="card-inputs">
                        <div class="input-group">
                            <label><i class="fa-solid fa-circle-check"></i> Correct Answers</label>
                            <input type="number" class="input-correct" min="0" value="0">
                        </div>
                        <div class="input-group">
                            <label><i class="fa-solid fa-circle-xmark"></i> Incorrect Answers</label>
                            <input type="number" class="input-incorrect" min="0" value="0">
                        </div>
                    </div>
                </div>
            </section>

            <!-- Engine Action Control -->
            <div class="action-container">
                <button id="btn-calculate" class="btn btn-primary"><i class="fa-solid fa-wand-magic-sparkles"></i> Compute Metrics</button>
                <button id="btn-reset" class="btn btn-secondary"><i class="fa-solid fa-rotate-left"></i> Clear All</button>
            </div>

            <!-- Dynamic Live Report Dashboard -->
            <section id="report-dashboard" class="report-panel glass-panel hidden">
                <h3 class="section-title"><i class="fa-solid fa-chart-pie"></i> Analysis Summary Dashboard</h3>
                
                <div class="metrics-grid">
                    <div class="metric-block total-score-block">
                        <span class="metric-label">Net Score Achieved</span>
                        <span id="stat-total-score" class="metric-value">0</span>
                    </div>
                    <div class="metric-block">
                        <span class="metric-label">Accuracy Rate</span>
                        <span id="stat-accuracy" class="metric-value">0%</span>
                    </div>
                    <div class="metric-block">
                        <span class="metric-label">Total Attempted</span>
                        <span id="stat-attempted" class="metric-value">0</span>
                    </div>
                    <div class="metric-block">
                        <span class="metric-label">Marks Lost Penalty</span>
                        <span id="stat-penalty" class="metric-value">0</span>
                    </div>
                </div>

                <div class="breakdown-list">
                    <h4 class="breakdown-title">Subject Wise Breakdown</h4>
                    <div id="subject-breakdown-output"></div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>

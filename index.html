<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse7 | AI Scoring Analytics</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="calculator-card">
        <div class="brand-header">
            <h1>Eclipse7</h1>
            <p>INTELLIGENT SCORING MODULE</p>
        </div>

        <div class="input-container">
            <input type="text" id="studentName" placeholder="Candidate Full Name">
            <input type="text" id="testName" placeholder="Examination Title">
            
            <div class="field-label">Total Attempted</div>
            <input type="number" id="attempted" value="0">
            
            <div class="field-label">Incorrect Responses</div>
            <input type="number" id="wrong" value="0">
            
            <div class="field-label">Negative Ratio (e.g., 4 for 1/4)</div>
            <input type="number" id="ratio" value="4">
        </div>

        <button class="btn-calc" onclick="calculateScore()">Calculate Final Score</button>
        
        <div class="result-box">
            <small>COMPUTED SCORE</small>
            <div id="score">0.00</div>
        </div>

        <button class="btn-pdf" onclick="downloadPDF()">Download Verified Report</button>
        
        <div class="footer-note">
            Official System of <a href="https://eclipse7.odoo.com/" target="_blank">Eclipse7 Digital</a> [cite: 10, 21]
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

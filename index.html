<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Negative Marking Engine | ECLIPSE7</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-canvas"></div> <div class="ai-container glass-effect">
        <header class="brand-header">
            <h1>ECLIPSE7</h1>
            <p class="branding">Powered by ECLIPSE7 AI | BY SAIPRASAD BARURE</p>
        </header>

        <div class="identity-group">
            <input type="text" id="studentName" placeholder="STUDENT IDENTITY" class="neon-input">
            <input type="text" id="testName" placeholder="ASSESSMENT NAME (e.g. JEE-26)" class="neon-input">
        </div>

        <div class="input-grid">
            <div class="input-group">
                <label>Questions</label>
                <input type="number" id="totalQs" value="0" class="neon-input">
            </div>
            <div class="input-group">
                <label>Max Marks</label>
                <input type="number" id="maxMarks" value="0" class="neon-input">
            </div>
            <div class="input-group">
                <label>Attempts</label>
                <input type="number" id="attempted" class="neon-input">
            </div>
            <div class="input-group">
                <label>Incorrect</label>
                <input type="number" id="wrong" class="neon-input">
            </div>
        </div>

        <select id="reportType" onchange="toggleSubjectInputs()" class="neon-select">
            <option value="overall">OVERALL ANALYTICS</option>
            <option value="subjectwise">DETAILED SUBJECT BREAKDOWN</option>
        </select>

        <div id="subjectSection" class="subject-panel" style="display: none;">
            <div class="subject-header-row">
                <span></span><span>ATT.</span><span>CORR.</span><span>WRNG.</span>
            </div>
            <div class="subject-row item-row">
                <label>PHYSICS</label>
                <input type="number" id="phyA" placeholder="0">
                <input type="number" id="phyC" placeholder="0">
                <input type="number" id="phyW" placeholder="0">
            </div>
            <div class="subject-row item-row">
                <label>CHEMISTRY</label>
                <input type="number" id="chemA" placeholder="0">
                <input type="number" id="chemC" placeholder="0">
                <input type="number" id="chemW" placeholder="0">
            </div>
            <div class="subject-row item-row">
                <label>MATH/BIO</label>
                <input type="number" id="mathBioA" placeholder="0">
                <input type="number" id="mathBioC" placeholder="0">
                <input type="number" id="mathBioW" placeholder="0">
            </div>
        </div>

        <button onclick="executeCalculation()" class="btn-primary">CHECK SCORE</button>

        <div class="score-display">
            <label>CALCULATED SCORE</label>
            <div id="score" class="score-val">0.00</div>
            <div class="efficiency-bar"><div id="progress" class="progress-fill"></div></div>
        </div>

        <button onclick="downloadPDF()" class="btn-secondary">EXPORT TO INTELLIGENCE E7 REPORT</button>
        
        <div class="privacy-note">
            <span style="color: var(--accent); font-weight: 800;">PRIVACY ASSURANCE:</span> 
            Data entered here stays on your device. We do not collect or store any personal metrics. 
            Enjoy the free service from <b>Saiprasad Barure / Prasad Reddy</b>.
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
